services:
  # Unified Web & Worker Service running both Dashboard and Daemon
  - type: web
    name: autoapply-pipeline
    env: python
    buildCommand: "bash ./build.sh"
    startCommand: "bash ./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TZ
        value: "Asia/Kolkata" # Ensures the 9:00 AM IST check works correctly
    # Persistent Disk to store logs and reports safely across deploys and share them between processes
    disk:
      name: pipeline-data
      mountPath: /opt/render/project/src/logs
      sizeGB: 1

