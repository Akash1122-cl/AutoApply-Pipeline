services:
  # 1. FastAPI Dashboard
  - type: web
    name: autoapply-dashboard
    env: python
    buildCommand: "bash ./build.sh"
    startCommand: "uvicorn src.web.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # 2. Orchestrator Daemon
  - type: worker
    name: autoapply-orchestrator
    env: python
    buildCommand: "bash ./build.sh"
    startCommand: "python -m src.orchestrator.main --daemon"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: TZ
        value: "Asia/Kolkata" # Ensures the 9:00 AM IST check works correctly
    # Persistent Disk to store logs and local generated documents safely across deploys
    disk:
      name: orchestrator-data
      mountPath: /opt/render/project/src/logs
      sizeGB: 1
